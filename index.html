<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>We’ll be back soon — Lanna Bloom</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #faf8f6;
      --text: #2c2420;
      --muted: #6b5e56;
      --accent: #8b4a5c;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.75rem;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
    }
    main {
      max-width: 28rem;
      text-align: center;
    }
    h1 {
      font-size: 1.375rem;
      font-weight: 600;
      margin: 0 0 1rem;
      letter-spacing: -0.02em;
    }
    p {
      margin: 0 0 1rem;
      color: var(--muted);
      font-size: 1rem;
    }
    p:last-child { margin-bottom: 0; }
    .thanks {
      color: var(--text);
      font-weight: 500;
    }
    .accent { color: var(--accent); }
    hr {
      border: none;
      border-top: 1px solid rgba(44, 36, 32, 0.12);
      margin: 1.5rem 0;
    }
    .th { font-size: 0.95rem; }
  </style>
</head>
<body>
  <main>
    <h1>Site under maintenance</h1>
    <p>We’re temporarily updating our website. Please check back soon.</p>
    <p class="thanks">Thank you for doing business with us — we truly appreciate your support.</p>
    <hr />
    <p class="th" lang="th">เว็บไซต์อยู่ระหว่างปรับปรุงชั่วคราว กรุณากลับมาใหม่เร็วๆ นี้</p>
    <p class="th thanks" lang="th">ขอบคุณที่ไว้วางใจและใช้บริการกับเรา</p>
  </main>
</body>
</html>
