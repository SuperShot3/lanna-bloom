<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>HyperFrames Preview</title>
    <style>
      html, body { margin: 0; padding: 0; background: #111; height: 100%; overflow: hidden; }
    </style>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@hyperframes/player"></script>
  </head>
  <body>
    <div id="preview-root" data-composition-id="preview" data-width="1080" data-height="1920" data-start="0" data-duration="15">
      <hyperframes-player id="p" controls autoplay muted
        style="display:block;width:100vw;height:100vh"></hyperframes-player>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines.preview = {
        duration: function () { return 15; },
        seek: function () {},
        pause: function () {}
      };
      document.getElementById("p").setAttribute("src", "./index.html" + location.search);
    </script>
  </body>
</html>
